name: Python Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        run: |
          python -m py_compile producer/src/order_event_producer.py
          python -m py_compile jobs/orders_raw_to_bronze_current.py
          python -m py_compile jobs/orders_metrics_5m.py
